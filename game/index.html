<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>순천대 SDGs 어드벤처 — 캠퍼스 미션</title>
<style>
  :root{
    --bg:#0f231c; --panel:#1a2438; --panel2:#232f47; --line:#3a4a6a;
    --accent:#7be0a0; --accent2:#ffd86b; --text:#eafff3; --sub:#aebccf;
    --e:#60a69b; --s:#ef8ba5; --g:#f0b96f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#7fc4e8;color:var(--text);
    font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;overflow:hidden;}
  canvas#cv{display:block;width:100%;height:100%;touch-action:none;image-rendering:pixelated;image-rendering:crisp-edges;}

  .ui{position:fixed;z-index:20;}
  #banner{top:14px;left:14px;background:#1a2438e8;border:2px solid #3a4a6a;border-radius:12px;
    padding:11px 16px 11px 13px;display:flex;gap:11px;align-items:center;box-shadow:0 5px 18px #0006;backdrop-filter:blur(5px);}
  #banner .flag{font-size:26px;} #banner b{font-size:15px;display:block;line-height:1.25;} #banner small{font-size:12px;color:var(--sub);}
  #topright{top:14px;right:14px;display:flex;gap:7px;}
  .iconbtn{pointer-events:auto;background:#1a2438e8;border:2px solid #3a4a6a;color:var(--text);border-radius:11px;width:42px;height:42px;
    font-size:19px;cursor:pointer;box-shadow:0 4px 12px #0006;backdrop-filter:blur(5px);transition:transform .05s;}
  .iconbtn:active{transform:scale(.9);}
  #questPanel{top:66px;right:14px;width:248px;background:#1a2438e8;border:2px solid #3a4a6a;border-radius:13px;padding:12px 14px;box-shadow:0 5px 18px #0006;backdrop-filter:blur(5px);}
  #questPanel h3{margin:0 0 9px;font-size:13px;color:var(--accent2);display:flex;align-items:center;gap:6px;}
  .qline{font-size:12.5px;color:var(--text);margin:7px 0;display:flex;gap:7px;align-items:flex-start;line-height:1.4;}
  .qline .ck{flex-shrink:0;width:16px;height:16px;border-radius:5px;border:1.5px solid #4a5a7a;display:inline-flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;}
  .qline.done{color:var(--sub);} .qline.done .ck{background:var(--accent);border-color:var(--accent);color:#06281a;} .qline b{color:var(--accent);}
  #chatbox{left:14px;bottom:14px;width:330px;background:#11192be8;border:2px solid #3a4a6a;border-radius:12px;box-shadow:0 5px 18px #0006;backdrop-filter:blur(5px);overflow:hidden;}
  .chattabs{display:flex;border-bottom:1px solid #3a4a6a;} .chattabs div{padding:7px 14px;font-size:12px;color:var(--sub);cursor:pointer;border-right:1px solid #3a4a6a;}
  .chattabs div.on{background:#232f47;color:var(--text);}
  #chatlog{height:118px;overflow-y:auto;padding:9px 11px;font-size:12.5px;display:flex;flex-direction:column;gap:4px;}
  .msg b{color:#7bc8e0;} .msg.me b{color:var(--accent2);}
  .chatin{display:flex;border-top:1px solid #3a4a6a;} .chatin input{flex:1;background:transparent;border:none;color:var(--text);padding:9px 11px;font-size:13px;outline:none;}
  .chatin button{background:none;border:none;color:var(--accent);font-size:17px;cursor:pointer;padding:0 12px;}
  #stats{bottom:96px;left:50%;transform:translateX(-50%);display:flex;gap:12px;}
  .statbar{width:190px;height:24px;background:#11192bcc;border:2px solid #3a4a6a;border-radius:13px;overflow:hidden;position:relative;box-shadow:0 4px 12px #0006;}
  .statbar .fill{height:100%;transition:width .3s;} .statbar .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px #000a;gap:5px;}
  .hp .fill{background:linear-gradient(90deg,#ff5a5a,#ff8a6a);} .en .fill{background:linear-gradient(90deg,#3a9ee0,#5fd0ff);}
  #hotbar{bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:5px;background:#11192be8;border:2px solid #3a4a6a;border-radius:12px;padding:6px;box-shadow:0 5px 18px #0006;backdrop-filter:blur(5px);}
  .slot{width:44px;height:44px;border-radius:9px;background:#232f47;border:1.5px solid #3a4a6a;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;}
  .slot .cnt{position:absolute;right:3px;bottom:1px;font-size:10px;font-weight:800;color:var(--accent2);}
  #minimap{bottom:14px;right:14px;width:172px;height:120px;background:#11192be8;border:2px solid #3a4a6a;border-radius:12px;box-shadow:0 5px 18px #0006;overflow:hidden;}
  #miniC{width:100%;height:100%;display:block;}
  #pts{top:66px;left:14px;background:#1a2438e8;border:2px solid #3a4a6a;border-radius:11px;padding:8px 13px;font-size:13px;font-weight:800;box-shadow:0 4px 12px #0006;backdrop-filter:blur(5px);display:flex;gap:7px;align-items:center;}
  #pts small{font-weight:500;color:var(--sub);font-size:11px;}
  #dpad{position:fixed;left:16px;bottom:150px;width:138px;height:138px;z-index:21;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:5px;opacity:.85;touch-action:none;}
  .dbtn{background:#1a2438cc;border:1.5px solid #3a4a6a;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text);user-select:none;cursor:pointer;backdrop-filter:blur(4px);}
  .dbtn:active{background:var(--accent);color:#06281a;} .dbtn.empty{background:transparent;border:none;}
  #actBtn{position:fixed;right:200px;bottom:150px;width:72px;height:72px;border-radius:50%;background:linear-gradient(180deg,#9bf0bb,#5fce86);color:#06281a;border:3px solid #d6ffe6;font-weight:900;font-size:13px;z-index:21;cursor:pointer;box-shadow:0 5px 0 #2c7a5d;}
  #actBtn:active{transform:translateY(4px);box-shadow:0 1px 0 #2c7a5d;}
  #prompt{position:fixed;left:50%;bottom:128px;transform:translateX(-50%);z-index:19;background:linear-gradient(180deg,#9bf0bb,#5fce86);color:#06281a;font-weight:800;padding:9px 17px;border-radius:30px;display:none;animation:bob 1.1s infinite;box-shadow:0 4px 0 #2c7a5d,0 8px 16px #0006;font-size:14px;border:2px solid #d6ffe6;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
  .overlay{position:fixed;inset:0;background:#02110bcc;display:none;align-items:center;justify-content:center;z-index:40;padding:14px;backdrop-filter:blur(3px);}
  .overlay.show{display:flex;}
  .modal{background:linear-gradient(180deg,#1e2a42,#172033);border:2px solid #3a4a6a;border-radius:18px;width:100%;max-width:450px;max-height:88vh;overflow-y:auto;box-shadow:0 14px 40px #000a;}
  .mhead{padding:15px 17px;border-bottom:1.5px solid #3a4a6a;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#1e2a42;z-index:2;}
  .mhead h2{margin:0;font-size:17px;} .mbody{padding:17px;}
  .x{background:none;border:none;color:var(--sub);font-size:24px;cursor:pointer;line-height:1;}
  .npcname{font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;}
  .tag-e{background:var(--e);color:#fff;} .tag-s{background:var(--s);color:#fff;} .tag-g{background:var(--g);color:#5a3a10;}
  .btn{display:inline-block;width:100%;background:linear-gradient(180deg,#9bf0bb,#5fce86);color:#06281a;border:none;padding:13px;border-radius:13px;font-weight:800;font-size:15px;cursor:pointer;margin-top:8px;box-shadow:0 4px 0 #2c7a5d;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #2c7a5d;}
  .btn.alt{background:linear-gradient(180deg,#37466a,#28344f);color:var(--text);box-shadow:0 4px 0 #161d2e;}
  .btn.ghost{background:transparent;border:1.5px solid #3a4a6a;color:var(--text);box-shadow:none;} .btn:disabled{opacity:.45;cursor:not-allowed;}
  .quest{background:#232f4790;border:1px solid #3a4a6a;border-radius:14px;padding:13px;margin-bottom:10px;}
  .quest h4{margin:0 0 4px;font-size:15px;} .quest p{margin:0 0 8px;font-size:13px;color:var(--sub);line-height:1.5;}
  .reward{display:inline-flex;gap:4px;font-size:12px;font-weight:700;background:#11192b;padding:5px 9px;border-radius:8px;margin-right:6px;}
  .steps{display:flex;gap:4px;font-size:11px;margin:8px 0;flex-wrap:wrap;} .step{padding:3px 8px;border-radius:7px;background:#11192b;color:var(--sub);}
  .step.done{background:var(--accent);color:#06281a;font-weight:800;} .step.now{background:var(--accent2);color:#3a2c00;font-weight:800;}
  .filterbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .filterbar button{flex:1;min-width:60px;padding:8px;border-radius:10px;border:1px solid #3a4a6a;background:#11192b;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;}
  .filterbar button.on{background:var(--accent);color:#06281a;}
  .dropzone{border:2px dashed #3a4a6a;border-radius:14px;padding:22px;text-align:center;color:var(--sub);font-size:13px;background:#11192b;cursor:pointer;}
  .learncard{background:linear-gradient(135deg,#2a3b5c,#172033);border:2px solid var(--accent);border-radius:16px;padding:17px;}
  .learncard .lk{font-size:11px;color:var(--accent);font-weight:800;letter-spacing:1px;}
  .bins{display:flex;gap:8px;justify-content:center;margin-top:14px;} .bin{flex:1;border:2px solid #3a4a6a;border-radius:13px;padding:11px 4px;font-size:12px;font-weight:800;cursor:pointer;background:#11192b;}
  .bin:active{transform:scale(.94);} .trash{font-size:58px;margin:10px;animation:pop .3s;}
  @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .quizQ{font-size:16px;font-weight:700;margin-bottom:14px;line-height:1.5;}
  .quizOpt{display:block;width:100%;text-align:left;background:#28344f;border:1px solid #3a4a6a;color:var(--text);padding:13px;border-radius:11px;margin-bottom:8px;cursor:pointer;font-size:14px;}
  .quizOpt:hover{border-color:var(--accent);}
  .rankrow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:11px;margin-bottom:6px;background:#232f4790;}
  .rankrow.me{border:2px solid var(--accent2);background:#33405e;} .rnum{font-weight:900;width:28px;text-align:center;font-size:15px;}
  .rbar{flex:1;height:9px;background:#11192b;border-radius:6px;overflow:hidden;} .rbarf{height:100%;background:linear-gradient(90deg,#7be0a0,#bff7d3);}
  .shopitem{display:flex;align-items:center;gap:11px;background:#232f4790;border:1px solid #3a4a6a;border-radius:14px;padding:11px;margin-bottom:8px;}
  .shopicon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:27px;background:#11192b;flex-shrink:0;}
  .rare{font-size:10px;padding:2px 7px;border-radius:7px;font-weight:800;} .r-normal{background:#3a5a4a;} .r-season{background:#2f6fae;} .r-limited{background:#a86adf;}
  .toast{position:fixed;left:50%;top:64px;transform:translateX(-50%);z-index:60;background:linear-gradient(180deg,#ffe79a,#ffd34d);color:#3a2c00;font-weight:800;padding:11px 20px;border-radius:30px;box-shadow:0 5px 16px #0007;opacity:0;transition:opacity .3s,top .3s;pointer-events:none;font-size:14px;border:2px solid #fff3c4;}
  .toast.show{opacity:1;top:76px;}
  .hint{font-size:11px;color:var(--sub);text-align:center;margin-top:10px;line-height:1.6;} input[type=text]{font-family:inherit;}
  #intro .modal{max-width:420px;} .mascotrow{display:flex;gap:8px;justify-content:center;margin:14px 0;}
  .mascot{text-align:center;font-size:11px;color:var(--sub);flex:1;} .mascot img{width:52px;height:62px;object-fit:contain;display:block;margin:0 auto 4px;image-rendering:pixelated;}
  .modal img{image-rendering:pixelated;}
  @media(max-width:760px){ #questPanel{width:172px;font-size:11px;padding:9px;} #chatbox{width:210px;} #minimap{width:118px;height:82px;} #stats{bottom:84px;gap:7px;} .statbar{width:120px;} #banner b{font-size:13px;} #banner{padding:8px 11px;} }
  @media(min-width:760px){ #dpad,#actBtn{display:none;} }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="ui" id="banner"><div class="flag">🚩</div><div><b>순천대 SDGs 어드벤처</b><small>캠퍼스 미션</small></div></div>
<div class="ui" id="pts">🌱 <span id="hudPts">0</span> <small>에코포인트 · Lv.<span id="hudLv">1</span></small></div>
<div class="ui" id="topright">
  <button class="iconbtn" onclick="openLog()" title="저널">📔</button>
  <button class="iconbtn" onclick="openSettings()" title="메뉴">⚙️</button>
</div>
<div class="ui" id="questPanel"><h3>⭐ SDG/ESG 퀘스트</h3><div id="qlines"></div></div>
<div class="ui" id="stats">
  <div class="statbar hp"><div class="fill" id="hpFill" style="width:100%"></div><div class="lbl">❤️ 체력</div></div>
  <div class="statbar en"><div class="fill" id="enFill" style="width:30%"></div><div class="lbl">⚡ 에코 에너지</div></div>
</div>
<div class="ui" id="hotbar"></div>
<div class="ui" id="chatbox">
  <div class="chattabs"><div class="on">채팅</div><div onclick="toast('데모: 귓속말 탭')">귓속말</div><div onclick="toast('데모: 파티 탭')">파티</div></div>
  <div id="chatlog"></div>
  <div class="chatin"><input id="chatIn" type="text" maxlength="60" placeholder="메시지 입력 (Enter)"><button onclick="sendChat()">➤</button></div>
</div>
<div class="ui" id="minimap"><canvas id="miniC" width="172" height="120"></canvas></div>

<div id="prompt"></div>
<div id="dpad">
  <div class="dbtn empty"></div><div class="dbtn" data-d="up">▲</div><div class="dbtn empty"></div>
  <div class="dbtn" data-d="left">◀</div><div class="dbtn empty"></div><div class="dbtn" data-d="right">▶</div>
  <div class="dbtn empty"></div><div class="dbtn" data-d="down">▼</div><div class="dbtn empty"></div>
</div>
<button id="actBtn">상호<br>작용</button>

<div class="overlay" id="ov"><div class="modal" id="ovModal"></div></div>
<div class="overlay show" id="intro"><div class="modal">
  <div class="mhead"><h2>🌳 순천대 SDGs 어드벤처</h2></div>
  <div class="mbody">
    <p style="font-size:13px;color:var(--sub);line-height:1.6;margin-top:0;">아이소메트릭 캠퍼스를 누비며 SDGs/ESG를 실천하는 게임입니다. 마스코트에게 퀘스트를 받아 현실 활동을 인증하고 <b style="color:var(--accent)">에코포인트</b>를 모으세요!</p>
    <div class="mascotrow">
      <div class="mascot"><img id="m1"> 우송이<br><span class="npcname tag-e">환경 E</span></div>
      <div class="mascot"><img id="m2"> 체리니<br><span class="npcname tag-s">사회 S</span></div>
      <div class="mascot"><img id="m3"> 총장님<br><span class="npcname tag-g">지배구조 G</span></div>
    </div>
    <label style="font-size:12px;color:var(--sub)">닉네임 (2~10자)</label>
    <input type="text" id="nickIn" maxlength="10" placeholder="예: 김순천" style="width:100%;background:#11192b;border:1px solid #3a4a6a;border-radius:11px;color:var(--text);padding:12px;margin:6px 0;font-size:15px;">
    <button class="btn" onclick="startGame()">캠퍼스 입장 🚪</button>
    <div class="hint">PC: 방향키/WASD 이동 · Space/E 상호작용 &nbsp;|&nbsp; 모바일: 화면 버튼</div>
  </div>
</div></div>
<div class="toast" id="toast"></div>

function drawCosmetic(id,cx,hyTop,shY,grp,fdir){

  if(id==='eco_cape'){ ctx.fillStyle='#c4564a'; ctx.beginPath(); ctx.moveTo(cx-9,shY); ctx.lineTo(cx+9,shY); ctx.lineTo(cx+6,shY+22); ctx.lineTo(cx-6,shY+22); ctx.closePath(); ctx.fill(); ctx.strokeStyle=PAL.out; ctx.stroke(); ctx.fillStyle='#ffd34d'; ctx.fillRect(cx-2,shY-1,4,3); }
  if(id==='hat_grad'){ ctx.fillStyle='#2b2230'; ctx.fillRect(cx-9,hyTop-1,18,3);
    ctx.beginPath(); ctx.moveTo(cx,hyTop-8); ctx.lineTo(cx+12,hyTop-2); ctx.lineTo(cx,hyTop+4); ctx.lineTo(cx-12,hyTop-2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffd34d'; ctx.fillRect(cx-1,hyTop-3,2,2); ctx.fillRect(cx+8,hyTop-2,2,9); }
  if(id==='leaf_crown'){ ctx.fillStyle='#5aa84e'; for(let i=-1;i<=1;i++){ const lx=cx+i*8; ctx.beginPath(); ctx.moveTo(lx,hyTop-6); ctx.lineTo(lx+4,hyTop-1); ctx.lineTo(lx-4,hyTop-1); ctx.closePath(); ctx.fill(); } ctx.fillStyle='#86c46a'; ctx.fillRect(cx-1,hyTop-5,2,2); ctx.strokeStyle=PAL.out; }
  if(id==='cherry_pin' && grp!=='back'){ const px=cx+(grp==='side'?(fdir<0?-7:7):8); ctx.fillStyle='#ff9ec2'; for(const[dx,dy]of[[0,-2],[2,0],[0,2],[-2,0]])ctx.fillRect(px+dx-1,hyTop+1+dy,2,2); ctx.fillStyle='#ffe79a'; ctx.fillRect(px-1,hyTop+1,2,2); }
  if(id==='glasses' && grp!=='back'){ ctx.strokeStyle='#2b2230'; ctx.lineWidth=2;
    if(grp==='side'){ const gx0=cx+(fdir<0?-7:3); ctx.strokeRect(gx0,hyTop+6,5,4); }
    else { ctx.strokeRect(cx-7,hyTop+6,5,4); ctx.strokeRect(cx+2,hyTop+6,5,4); ctx.beginPath(); ctx.moveTo(cx-2,hyTop+8); ctx.lineTo(cx+2,hyTop+8); ctx.stroke(); } }
  ctx.restore();
}

const PXZOOM=2;
let DPR=1/PXZOOM;
function resize(){cv.width=Math.ceil(innerWidth*DPR);cv.height=Math.ceil(innerHeight*DPR);cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';ctx.setTransform(DPR,0,0,DPR,0,0);ctx.imageSmoothingEnabled=false;}
addEventListener('resize',resize); resize();
const VW=()=>cv.width/DPR, VH=()=>cv.height/DPR;

const TW=64, TH=32, HW=32, HH=16;

let nearTarget=null;
function updateNear(){ let best=null,bd=1.6;
  for(const n of npcs){ const d=Math.hypot(player.gx-(n.gx+.5),player.gy-(n.gy+.5)); if(d<bd){bd=d;best={type:'npc',obj:n};} }
  for(const b of buildings){ const cx=b.gx+b.w/2, cy=b.gy+b.d; const d=Math.hypot(player.gx-cx,player.gy-cy); if(d<1.8&&(!best||d<bd)){best={type:'build',obj:b};bd=d;} }
  const pc=Math.hypot(player.gx-PLAZA.gx,player.gy-PLAZA.gy); if(pc<2.6&&(!best||pc<bd)){best={type:'plaza'};bd=pc;}

let running=false;
function loop(){
  if(running){
    let dx=0,dy=0;
    if(keys['arrowup']||keys['w']||held.up){dx-=1;dy-=1;}
    if(keys['arrowdown']||keys['s']||held.down){dx+=1;dy+=1;}
    if(keys['arrowleft']||keys['a']||held.left){dx-=1;dy+=1;}
    if(keys['arrowright']||keys['d']||held.right){dx+=1;dy-=1;}
    player.moving=!!(dx||dy);
    if(player.moving){ const m=Math.hypot(dx,dy)||1; dx/=m;dy/=m; player.t++;
      const nx=player.gx+dx*player.spd*1.4, ny=player.gy+dy*player.spd*1.4;
      if(!blocked(nx,player.gy)&&nx>0.5&&nx<GW-0.5) player.gx=nx;
      if(!blocked(player.gx,ny)&&ny>0.5&&ny<GH-0.5) player.gy=ny;
      const nd=dir8(dx,dy); if(nd) player.dir=nd;
    }
    const pc=iso(player.gx,player.gy); cam.x=pc.x; cam.y=pc.y; updateNear();
    crowd.forEach(c=>{ c.t++; if(Math.hypot(c.gx-c.tx,c.gy-c.ty)<0.1){ c.tx=PLAZA.gx-3+Math.random()*6;c.ty=PLAZA.gy-2+Math.random()*4; } const cd=dir8(c.tx-c.gx,c.ty-c.gy); if(cd)c.dir=cd; c.gx+=(c.tx-c.gx)*0.004; c.gy+=(c.ty-c.gy)*0.004; });
    // 마스코트 배회(가끔 집 주변을 걸어다님)
    npcs.forEach(n=>{ if(!n.home){ n.home={gx:n.gx,gy:n.gy}; n.tx=n.gx; n.ty=n.gy; n.wt=60+Math.random()*200; n.mv=false; n.face=1; }
      const ddx=n.tx-n.gx, ddy=n.ty-n.gy, dist=Math.hypot(ddx,ddy);
      if(dist<0.06){ n.mv=false; if(--n.wt<=0){ n.tx=n.home.gx+(Math.random()*5-2.5); n.ty=n.home.gy+(Math.random()*5-2.5); n.wt=140+Math.random()*260; } }
      else { const sp=0.018, nx=n.gx+ddx/dist*sp, ny=n.gy+ddy/dist*sp; let moved=false;
        if(!blocked(nx,n.gy)&&nx>1&&nx<GW-1){ n.gx=nx; moved=true; } if(!blocked(n.gx,ny)&&ny>1&&ny<GH-1){ n.gy=ny; moved=true; }
        n.mv=moved; if(!moved)n.wt=0; const nd=dir8(ddx,ddy); if(nd)n.dir=nd; n.wk=(n.wk||0)+1; } });
    if(playerHop>0)playerHop--; updateFX();
    if(State.owned['star_fx']==='worn' && Math.random()<0.14) spawnSparkle(player.gx,player.gy,2,'#bff7ff');
    const isN=NF>0.5; if(isN!==lastNight){ lastNight=isN; toast(isN?'🌙 밤이 되었어요':'☀️ 아침이 밝았어요'); }
  }
  render(); requestAnimationFrame(loop);
}

    <div style="text-align:center"><div class="trash">${it.emo}</div><div style="font-weight:800">${it.n}</div><p style="color:var(--sub);font-size:12px">알맞은 분리수거함을 누르세요</p>
    <div class="bins">${BINS.map(b=>`<div class="bin" onclick="recyPick('${b}')">${b}</div>`).join('')}</div></div>`);}
function recyPick(bin){const r=recyState,it=r.order[r.i];if(bin===it.b){r.score+=10;toast('정답! +10');}else toast('❌ '+it.n+' → '+it.b);r.i++;r.t=0;renderRecycle();}
function tick(){if(!recyState){clearTimeout(recyTimer);return;}recyState.t+=0.1;const el=document.getElementById('recyT');if(el)el.textContent=Math.max(0,(10-recyState.t)).toFixed(0);
  if(recyState.t>=10){recyState.i++;recyState.t=0;renderRecycle();}if(recyState)recyTimer=setTimeout(tick,100);}
function finishRecycle(){clearTimeout(recyTimer);const sc=recyState.score,pts=Math.round(sc/2);addReward(pts,sc,'분리수거 미니게임');recyState=null;
  modal('♻️ 결과',`<p style="text-align:center;font-size:18px"><b>${sc}점</b></p><p style="text-align:center;color:var(--sub)">🌱 +${pts} 에코포인트 · ⭐ +${sc}xp</p><div class="learncard"><div class="lk">📚 학습</div><p style="font-size:13px;margin:6px 0">올바른 분리배출은 자원순환(SDG 12)의 출발점이에요.</p></div><button class="btn" onclick="startRecycle()">한 번 더 ♻️</button><button class="btn ghost" onclick="closeOv()">닫기</button>`);}
function startEsgMini(){quizState={q:{title:'ESG 스피드 퀴즈',pts:30,xp:30,cat:'E',id:'__esg',learn:{k:'SDGs/ESG 종합',tip:'생활 속 작은 선택이 모여 캠퍼스의 지속가능성을 만듭니다.',link:'그린순천 동아리'}},set:QUIZ.esgmini,i:0,correct:0};delete State.doneQuests['__esg'];renderQuiz();}
function openChat(){ modal('💬 소셜 광장',`<p style="color:var(--sub);font-size:13px;margin-top:0">광장에 모인 친구들과 소통하고 미니게임도 즐겨보세요.</p><div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn alt" style="margin-top:0" onclick="startRecycle()">♻️ 분리수거</button><button class="btn alt" style="margin-top:0" onclick="startEsgMini()">❓ ESG 퀴즈</button></div><p class="hint">광장 채팅은 화면 왼쪽 아래 채팅창에서 바로 할 수 있어요. 실서비스는 실시간 멀티플레이로 구현됩니다.</p><button class="btn ghost" onclick="closeOv()">닫기</button>`);}
const chatMsgs=[{n:'에코지기',m:'순천대 에코 캠퍼스에 오신 걸 환영해요! 🌳'},{n:'그린순천',m:'오늘 4시 정문 플로깅 모집합니다~'},{n:'User_han300',m:'태양광 패널 보러 가자!'}];
const bot=['좋아요 같이해요!','저도 방금 텀블러 인증했어요 ☕','우리 학과 랭킹 올리자!','오 그거 꿀팁이네요 👍','지금 갈게요!','SDG 13 미션 완료!'];
function renderChat(){const el=document.getElementById('chatlog');if(!el)return;el.innerHTML=chatMsgs.slice(-30).map(m=>`<div class="msg ${m.me?'me':''}"><b>${m.n}:</b> ${m.m}</div>`).join('');el.scrollTop=el.scrollHeight;}
function sendChat(){const inp=document.getElementById('chatIn'),v=inp.value.trim();if(!v)return;const {out,hit}=cleanText(v);if(hit)toast('⚠️ 비속어는 사용할 수 없어요');chatMsgs.push({n:State.nick,m:out,me:true});inp.value='';renderChat();
  setTimeout(()=>{const r=['도서관친구','채식러','자전거왕','User_han300'][Math.floor(Math.random()*4)];chatMsgs.push({n:r,m:bot[Math.floor(Math.random()*bot.length)]});renderChat();},900);}
document.getElementById('chatIn').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
function openShop(){let html=`<p style="color:var(--sub);font-size:13px;margin-top:0">🌱 보유 <b style="color:var(--accent)">${State.pts}</b> 에코포인트로 캐릭터를 꾸며보세요.</p>`;
  SHOP.forEach(it=>{const owned=State.owned[it.id],worn=owned==='worn';
    html+=`<div class="shopitem"><div class="shopicon">${it.icon}</div><div style="flex:1"><b>${it.name}</b> <span class="rare r-${it.rare}">${rareName[it.rare]}</span><div style="font-size:12px;color:var(--sub)">🌱 ${it.price}</div></div>
      ${owned?(worn?`<button class="btn alt" style="width:auto;margin:0" onclick="wear('${it.id}',false)">착용중</button>`:`<button class="btn" style="width:auto;margin:0" onclick="wear('${it.id}',true)">착용</button>`):`<button class="btn" style="width:auto;margin:0" onclick="buy('${it.id}')" ${State.pts<it.price?'disabled':''}>구매</button>`}</div>`;});
  html+=`<button class="btn ghost" onclick="closeOv()">닫기</button>`;modal('🛍️ 캐릭터 꾸미기 상점',html);}
function buy(id){const it=SHOP.find(s=>s.id===id);if(State.pts<it.price){toast('포인트가 부족해요');return;}State.pts-=it.price;State.owned[id]='owned';syncHUD();save();toast('🛍️ '+it.name+' 구매 완료!');openShop();}
function wear(id,on){Object.keys(State.owned).forEach(k=>{if(State.owned[k]==='worn')State.owned[k]='owned';});State.owned[id]=on?'worn':'owned';save();toast(on?'착용했어요!':'벗었어요');openShop();}
function openRank(){const rows=RANK_BASE.map(r=>r.dept===State.dept?{...r,p:r.p+State.pts}:r).sort((a,b)=>b.p-a.p);const max=rows[0].p||1;
  let html=`<div class="filterbar"><button class="on">시즌</button><button onclick="toast('데모: 일/주 전환은 실서비스에서')">주간</button><button onclick="toast('데모: 일/주 전환은 실서비스에서')">일간</button></div>`;
  rows.forEach((r,i)=>{const me=r.dept===State.dept;html+=`<div class="rankrow ${me?'me':''}"><div class="rnum">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div><div style="flex:1"><div style="font-size:13px;font-weight:700">${r.dept}${me?' (나)':''}</div><div class="rbar"><div class="rbarf" style="width:${r.p/max*100}%"></div></div></div><div style="font-weight:800;font-size:13px">${r.p.toLocaleString()}</div></div>`;});
  html+=`<p class="hint">내 활동이 <b>${State.dept}</b> 점수에 실시간 반영됩니다.</p><button class="btn ghost" onclick="closeOv()">닫기</button>`;modal('🏆 학과 ESG 랭킹',html);}
function openLog(){let html=`<p style="color:var(--sub);font-size:13px;margin-top:0">최근 획득 내역</p>`;
  if(!State.log.length)html+=`<p style="color:var(--sub);text-align:center;padding:20px">아직 활동 내역이 없어요. 마스코트(!)를 찾아가세요!</p>`;
  State.log.forEach(l=>html+=`<div class="shopitem"><div class="shopicon">🌱</div><div style="flex:1"><b>${l.reason}</b><div style="font-size:11px;color:var(--sub)">${l.t}</div></div><div style="text-align:right;font-size:12px;font-weight:800">+${l.pts}P<br><span style="color:var(--accent)">+${l.xp}xp</span></div></div>`);
  if(State.archive.length){html+=`<h3 style="font-size:14px;margin:14px 0 8px">📚 학습 아카이브</h3>`;State.archive.slice(0,10).forEach(a=>html+=`<div class="quest" style="margin-bottom:6px"><h4 style="font-size:13px">${a.title} <span class="npcname ${a.cat==='E'?'tag-e':a.cat==='S'?'tag-s':'tag-g'}" style="font-size:9px">${catName[a.cat]}</span></h4><p style="margin:0">${a.tip}</p></div>`);}
  html+=`<button class="btn ghost" onclick="closeOv()">닫기</button>`;modal('📜 보상 & 학습 내역',html);}
function openHelp(){modal('❓ 게임 안내',`<p style="font-size:13px;line-height:1.7"><b>🎮 조작</b><br>PC: 방향키/WASD 이동 · Space/E 상호작용<br>모바일: 좌측 방향패드 + 상호작용 버튼<br><br><b>🌱 핵심 루프</b><br>① 마스코트(!) 찾기 → ② 퀘스트 수락 → ③ 인증(사진/QR/영수증) 또는 퀴즈 → ④ 에코포인트·경험치 → ⑤ 꾸미기 / 학과 랭킹<br><br><b>🗺️ 시설</b><br>🏛️ 대학본부(A1·G) · 📚 도서관(C1·E) · ⚙️ 공과대학(D2) · 🏫 학생회관(A4·S) · 🚪 정문(A19·광장)<br><br><b>🐾 마스코트</b><br>🌲 우송이(환경 E) · 🌸 체리니(사회 S) · 🐱 총장님(지배구조 G)</p><p class="hint">기획 검증용 프로토타입입니다. 인증·채팅·멀티플레이는 모의 동작합니다.</p><button class="btn" onclick="closeOv()">시작하기</button>`);}

renderChat(); syncHUD();
</script>
</body>
</html>
